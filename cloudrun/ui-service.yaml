apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bist-bot-ui
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/bist-bot:latest
          env:
            - name: PORT
              value: "8080"
            - name: PYTHONPATH
              value: "/app/src"
            - name: DB_PATH
              value: "/tmp/bist_signals.db"
            - name: API_BASE_URL
              value: "https://bist-bot-api-REPLACE.a.run.app"
          ports:
            - name: http1
              containerPort: 8080
