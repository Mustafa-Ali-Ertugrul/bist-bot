apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bist-bot-api
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/bist-bot:latest
          command: ["python"]
          args: ["dashboard.py"]
          env:
            - name: PORT
              value: "8080"
            - name: PYTHONPATH
              value: "/app/src"
            - name: DB_PATH
              value: "/tmp/bist_signals.db"
            - name: JWT_SECRET_KEY
              # WARNING: Do not hardcode secret values in this file!
              # In Cloud Run, JWT_SECRET_KEY must be configured as:
              # 1. A secret mounted to the container (using Cloud Run Secret Manager), OR
              # 2. An environment variable set in the Cloud Run service configuration
              # For local development, set JWT_SECRET_KEY via environment variable or .env file
            - name: RATE_LIMIT_STORAGE_URI
              value: "memory://"
            - name: CORS_ORIGINS
              value: "https://bist-bot-ui-REPLACE.a.run.app"
            # Admin bootstrap: set these to seed an initial admin user on first startup.
            # ADMIN_BOOTSTRAP_PASSWORD_HASH must be a pre-computed bcrypt or scrypt hash.
            # Generate with: python -c "from werkzeug.security import generate_password_hash; print(generate_password_hash('your_password', method='scrypt'))"
            # Or use Cloud Run Secret Manager for production secrets.
            # - name: ADMIN_BOOTSTRAP_EMAIL
            #   value: "admin@bistbot.com"
            # - name: ADMIN_BOOTSTRAP_PASSWORD_HASH
            #   value: "replace_with_scrypt_or_bcrypt_hash"
          ports:
            - name: http1
              containerPort: 8080
