version: '3.8'

services:
  bot:
    build: .
    container_name: bist-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FLASK_DEBUG: "False"
      DB_PATH: /app/data/bist_signals.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    ports:
      - "8501:8501"
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
