version: "3.8"

x-bist-bot-common: &bist-bot-common
  build: .
  environment:
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-/run/secrets/telegram_bot_token}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
    JWT_SECRET_KEY_FILE: ${JWT_SECRET_KEY_FILE:-/run/secrets/jwt_secret_key}
    FLASK_DEBUG: "False"
    API_BASE_URL: http://flask-api:5000
    DB_PATH: /app/data/bist_signals.db
    PYTHONPATH: /app/src
  volumes:
    - ./data:/app/data
    - ./secrets:/run/secrets:ro
  restart: unless-stopped

services:
  flask-api:
    <<: *bist-bot-common
    container_name: bist-bot-api
    command: ["python", "dashboard.py"]
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  streamlit-ui:
    <<: *bist-bot-common
    container_name: bist-bot-ui
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      flask-api:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scanner-worker:
    <<: *bist-bot-common
    container_name: bist-bot-worker
    command: ["python", "main.py", "--worker"]
    depends_on:
      flask-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
