<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bist-Bot Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            secondary: "#48ddbc",
            "surface-container": "#1c2026",
            "outline-variant": "#414755",
            "surface-variant": "#31353c",
            background: "#10141a",
            "on-surface": "#dfe2eb",
            primary: "#adc6ff",
            tertiary: "#ffb4aa"
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    body { background-color: #10141a; color: #dfe2eb; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-background text-on-surface">
  <header class="fixed top-0 z-50 flex h-16 w-full items-center justify-between bg-[#10141a]/80 px-6 backdrop-blur-xl border-b border-white/5">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-primary">smart_toy</span>
      <span class="text-xl font-black tracking-tighter text-[#adc6ff]">Bist-Bot</span>
    </div>
    <div class="flex items-center gap-2 rounded-full bg-secondary/10 px-3 py-1">
      <span class="h-2 w-2 animate-pulse rounded-full bg-secondary"></span>
      <span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase tracking-widest text-secondary">Live</span>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 pt-24">
    <section class="mb-10">
      <h2 id="dashboard-status" class="mb-2 font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.3em] text-secondary text-center md:text-left">Canli Veri Senkronize</h2>
      <div class="flex items-baseline justify-center md:justify-start gap-3">
        <span id="portfolio-value" class="font-bold text-5xl tracking-tighter text-on-surface">₺0</span>
        <span id="portfolio-change" class="font-['Space_Grotesk'] text-lg font-bold text-secondary">+0.0%</span>
      </div>
    </section>

    <div class="grid grid-cols-12 gap-6">
      <!-- XU100 Widget -->
      <div class="col-span-12 lg:col-span-8 rounded-2xl bg-surface-container p-6 border border-white/5">
        <div class="flex items-center justify-between mb-8">
          <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-primary/10"><span class="material-symbols-outlined text-primary text-sm">trending_up</span></div>
            <h3 class="font-bold">BIST 100</h3>
          </div>
          <div class="text-right">
            <p id="xu100-price" class="text-lg font-bold font-['Space_Grotesk']">0.00</p>
            <p id="xu100-change" class="text-xs text-secondary">0.00%</p>
          </div>
        </div>
        <div class="h-32 flex items-end gap-1">
            <!-- Mock Chart bars -->
            <div class="flex-1 bg-primary/20 h-12 rounded-t"></div><div class="flex-1 bg-primary/30 h-16 rounded-t"></div><div class="flex-1 bg-primary/40 h-24 rounded-t"></div><div class="flex-1 bg-primary/50 h-20 rounded-t"></div><div class="flex-1 bg-primary/60 h-28 rounded-t"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="col-span-12 lg:col-span-4 flex flex-col gap-4">
        <div class="bg-surface-container p-6 rounded-2xl border-l-4 border-secondary">
          <p class="text-[10px] uppercase font-['Space_Grotesk'] text-on-surface/50 mb-2">Basari Orani</p>
          <span id="success-rate" class="text-3xl font-black">0.0%</span>
        </div>
        <div class="bg-surface-container p-6 rounded-2xl border-l-4 border-primary">
          <p class="text-[10px] uppercase font-['Space_Grotesk'] text-on-surface/50 mb-2">Toplam Sinyal</p>
          <span id="total-signals" class="text-3xl font-black">0</span>
        </div>
      </div>

      <!-- Table -->
      <div class="col-span-12 rounded-2xl bg-surface-container overflow-hidden border border-white/5">
        <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">list_alt</span>Aktif Pozisyonlar</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-white/5 text-[10px] uppercase font-['Space_Grotesk'] text-on-surface/50">
                <th class="px-6 py-4">Hisse</th>
                <th class="px-6 py-4">Giris</th>
                <th class="px-6 py-4">Son</th>
                <th class="px-6 py-4">Adet</th>
                <th class="px-6 py-4">Kar/Zarar</th>
              </tr>
            </thead>
            <tbody id="positions-body" class="divide-y divide-white/5">
                <!-- Kotlin injection -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
