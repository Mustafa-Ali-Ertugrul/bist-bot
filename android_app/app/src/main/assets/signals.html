<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bist-Bot | Sinyaller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            secondary: "#48ddbc",
            "surface-container": "#1c2026",
            background: "#10141a",
            "on-surface": "#dfe2eb",
            primary: "#adc6ff",
            tertiary: "#ffb4aa"
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #10141a; color: #dfe2eb; font-family: 'Inter', sans-serif; }
    .tab-active { background-color: #48ddbc; color: #10141a; }
    .tab-active-sell { background-color: #ffb4aa; color: #10141a; }
  </style>
</head>
<body class="bg-background text-on-surface">
  <header class="fixed top-0 z-50 flex h-16 w-full items-center justify-between bg-[#10141a]/80 px-6 backdrop-blur-xl border-b border-white/5">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-primary text-2xl">phone_in_talk_watchface_indicator</span>
      <h1 class="font-bold text-xl tracking-tighter text-[#adc6ff]">Bist-Bot</h1>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 pt-24">
    <!-- Sekme Çubuğu -->
    <div class="flex gap-2 mb-8 p-1 bg-surface-container rounded-xl w-fit mx-auto border border-white/5">
        <button id="btn-buy" onclick="window.currentFilter='BUY'; window.renderSignals();" class="tab-active px-8 py-2 rounded-lg font-bold text-xs uppercase tracking-widest transition-all">Alım Sinyalleri</button>
        <button id="btn-sell" onclick="window.currentFilter='SELL'; window.renderSignals();" class="px-8 py-2 rounded-lg font-bold text-xs uppercase tracking-widest text-on-surface/40 hover:bg-white/5 transition-all">Satış Sinyalleri</button>
    </div>

    <div id="signals-grid" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
      <!-- Kotlin injection -->
    </div>
  </main>

</body>
</html>
