name: Deploy Cloud Run

on:
  workflow_run:
    workflows: [&quot;CI&quot;]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: bist-bot
  API_SERVICE_NAME: bist-bot-api
  UI_SERVICE_NAME: bist-bot-ui

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      GCP_JWT_SECRET_NAME: ${{ vars.GCP_JWT_SECRET_NAME }}

    steps:
      - name: Check required configuration
        run: |
          test -n &quot;$GCP_PROJECT_ID&quot;
          test -n &quot;$GCP_REGION&quot;
          test -n &quot;$GCP_ARTIFACT_REGISTRY_REPOSITORY&quot;
          test -n &quot;$GCP_JWT_SECRET_NAME&quot;
          test -n &quot;${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}&quot;
          test -n &quot;${{ secrets.GCP_SERVICE_ACCOUNT }}&quot;

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker &quot;$GCP_REGION-docker.pkg.dev&quot; --quiet

      - name: Build and push container image
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE_URI=&quot;$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REGISTRY_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG&quot;
          echo &quot;IMAGE_URI=$IMAGE_URI&quot; >> &quot;$GITHUB_ENV&quot;
          gcloud builds submit --project &quot;$GCP_PROJECT_ID&quot; --no-cache --tag &quot;$IMAGE_URI&quot; .

      - name: Deploy API service
        run: |
          gcloud run deploy &quot;$API_SERVICE_NAME&quot; --project &quot;$GCP_PROJECT_ID&quot; --region &quot;$GCP_REGION&quot; --image &quot;$IMAGE_URI&quot; --allow-unauthenticated --command python --args dashboard.py --set-env-vars PYTHONPATH=/app/src,DB_PATH=/tmp/bist_signals.db,RATE_LIMIT_STORAGE_URI=memory:// --set-secrets JWT_SECRET_KEY=&quot;${GCP_JWT_SECRET_NAME}:latest&quot; --timeout=300 --no-cpu-throttling

          API_URL=&quot;$(gcloud run services describe &quot;$API_SERVICE_NAME&quot; --project &quot;$GCP_PROJECT_ID&quot; --region &quot;$GCP_REGION&quot; --format 'value(status.url)')&quot;
          echo &quot;API_URL=$API_URL&quot; >> &quot;$GITHUB_ENV&quot;

      - name: Deploy UI service
        run: |
          gcloud run deploy &quot;$UI_SERVICE_NAME&quot; --project &quot;$GCP_PROJECT_ID&quot; --region &quot;$GCP_REGION&quot; --image &quot;$IMAGE_URI&quot; --allow-unauthenticated --set-env-vars PYTHONPATH=/app/src,DB_PATH=/tmp/bist_signals.db,API_BASE_URL=&quot;$API_URL&quot; --timeout=300 --no-cpu-throttling

          UI_URL=&quot;$(gcloud run services describe &quot;$UI_SERVICE_NAME&quot; --project &quot;$GCP_PROJECT_ID&quot; --region &quot;$GCP_REGION&quot; --format 'value(status.url)')&quot;
          echo &quot;UI_URL=$UI_URL&quot; >> &quot;$GITHUB_ENV&quot;

      - name: Update API CORS origin
        run: |
          gcloud run services update &quot;$API_SERVICE_NAME&quot; --project &quot;$GCP_PROJECT_ID&quot; --region &quot;$GCP_REGION&quot; --update-env-vars CORS_ORIGINS=&quot;$UI_URL&quot;

      - name: Report deployed URLs
        run: |
          echo &quot;API_URL=$API_URL&quot;
          echo &quot;UI_URL=$UI_URL&quot;