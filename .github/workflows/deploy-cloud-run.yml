name: Deploy Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: bist-bot
  API_SERVICE_NAME: bist-bot-api
  UI_SERVICE_NAME: bist-bot-ui

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      GCP_JWT_SECRET_NAME: ${{ vars.GCP_JWT_SECRET_NAME }}

    steps:
      - name: Check required configuration
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_REGISTRY_REPOSITORY"
          test -n "$GCP_JWT_SECRET_NAME"
          test -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT }}"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Build and push container image
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE_URI="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REGISTRY_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          gcloud builds submit --project "$GCP_PROJECT_ID" --tag "$IMAGE_URI" .

      - name: Deploy API service
        run: |
          gcloud run deploy "$API_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --image "$IMAGE_URI" --allow-unauthenticated --command python --args dashboard.py --set-env-vars PYTHONPATH=/app/src,DB_PATH=/tmp/bist_signals.db,RATE_LIMIT_STORAGE_URI=memory:// --set-secrets JWT_SECRET_KEY="${GCP_JWT_SECRET_NAME}:latest" --timeout=300 --no-cpu-throttling
          API_URL="$(gcloud run services describe "$API_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format 'value(status.url)')"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"

      - name: Deploy UI service
        run: |
          gcloud run deploy "$UI_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --image "$IMAGE_URI" --allow-unauthenticated --set-env-vars PYTHONPATH=/app/src,DB_PATH=/tmp/bist_signals.db,API_BASE_URL="$API_URL",STREAMLIT_BACKGROUND_SCAN_TIMEOUT_SECONDS=180,API_REQUEST_TIMEOUT_SECONDS=45 --timeout=300 --no-cpu-throttling --session-affinity
          UI_URL="$(gcloud run services describe "$UI_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format 'value(status.url)')"
          echo "UI_URL=$UI_URL" >> "$GITHUB_ENV"

      - name: Update API CORS origin
        run: |
          gcloud run services update "$API_SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --update-env-vars CORS_ORIGINS="$UI_URL"

      - name: Report deployed URLs
        run: |
          echo "API_URL=$API_URL"
          echo "UI_URL=$UI_URL"

      - name: Post-deploy smoke test checklist
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## 🧪 Post-deploy smoke test checklist

          | # | Kontrol | Durum |
          |---|---------|-------|
          | 1 | Dashboard ve Scan Detail `Taranan varlik` / `Scanned` tutarli mi? | Manuel |
          | 2 | Invariant check: `accounted == total` ve `✓` mi? | Manuel |
          | 3 | Empty-state: scan var ama dashboard boş / "veri henüz hazir değil" mi? | Manuel |
          | 4 | Outcome accounting: generated, rejected, hold, error hepsi kapaniyor mu? | Manuel |
          | 5 | Sayfa geçişleri + refresh sonrasi sayaçlar stabil mi? | Manuel |
          | 6 | 0-signal scan: dashboard hala scan count gösteriyor mu? | Manuel |
          | 7 | Karma outcome test: hepsi bir bucket’a düştü mü? | Manuel |
          | 8 | Analysis sayfasi açiliyor, Plotly render oluyor, `yaxis` hatasi yok mu? | Manuel |
          | 9 | Son Akis / kayitli sinyal alani doğru / net empty state mi? | Manuel |
          | 10 | UX: gereksiz Logout başligi, nav tekrari, çelişen kartlar yok mu? | Manuel |

          ### Pass criteria
          - [ ] Dashboard ve Scan Detail ayni scan sayisini gösteriyor
          - [ ] Invariant check `✓`
          - [ ] Empty-state yanliş tetiklenmiyor
          - [ ] Outcome’lar eksiksiz sayiliyor
          - [ ] Refresh / page transition sonrasi veri bozulmuyor
          - [ ] Analysis sayfasi patlamiyor

          > .github/ISSUE_TEMPLATE/post_deploy_smoke_test.md template'inden kalici issue açabilirsiniz.
          EOF

      - name: Open post-deploy smoke test issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-8)"

          gh issue create \
            --title "Post-deploy smoke test – ${DEPLOY_DATE} (${SHORT_SHA})" \
            --label "deploy,smoke-test,manual-check" \
            --body "$(cat <<ISSUE_EOF
          ## Deploy bilgisi
          - **Commit SHA:** \`${{ github.sha }}\`
          - **Deploy tarihi:** ${DEPLOY_DATE}
          - **API URL:** ${API_URL}
          - **UI URL:** ${UI_URL}
          - **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---

          ## 1) Dashboard ve Scan Detail tutarliliği
          - [ ] Uygulamaya giriş yapildi
          - [ ] Bir scan çalistirildi
          - [ ] Dashboard'daki \`Taranan varlik\` sayisi not alindi
          - [ ] Scan Detail sayfasina geçildi
          - [ ] \`Scanned\` degeri ile karşilaştirildi
          - [ ] **Beklenen:** iki sayi ayni

          ## 2) Invariant check doğrulamasi
          - [ ] Scan Detail sayfasinda invariant göstergesi kontrol edildi
          - [ ] \`accounted / total\` değerine bakildi
          - [ ] Başarili durumda \`✓\` ve \`accounted == total\`
          - [ ] Eğer \`✗\` varsa hangi outcome'un eksik sayildiği not alindi

          ## 3) Empty-state davranişi
          - [ ] Scan tamamlandiktan sonra Dashboard'a dönüldü
          - [ ] \`Veri henüz hazir değil\` görünmemeli
          - [ ] Actionable signal \`0\` olsa bile scan özeti görünmeli
          - [ ] Hatali durum: scan var ama dashboard boş ekran veriyor mu? **Hayir**

          ## 4) Outcome accounting kontrolü
          - [ ] Dashboard rejection breakdown bölümü kontrol edildi
          - [ ] Generated / rejected accounting görünüyor
          - [ ] Hiçbir ticker sessizce kaybolmamiş
          - [ ] Özellikle şu durumlar gözlemlendi:
            - [ ] \`hold_neutral_zone\`
            - [ ] \`confluence_failed\`
            - [ ] \`insufficient_data\`
            - [ ] Timeout / error varsa onlar da görünüyor

          ## 5) Sayfa geçişlerinde veri stabilitesi
          - [ ] Dashboard → Scan Detail → Dashboard geçişi yapildi
          - [ ] Sayfa yenilendi
          - [ ] Yeniden giriş yapilip tekrar kontrol edildi
          - [ ] **Beklenen:** sayaçlar değişip bozulmamali, cache yüzünden eski veri görünmemeli

          ## 6) Sinyal olmayan scan testi
          - [ ] Hiç actionable signal üretmeyen bir scan senaryosu çaliştirildi
          - [ ] Dashboard yine scan count gösteriyor
          - [ ] "veri yok" değil, "0 signal" mantigiyla davraniyor
          - [ ] Scan Detail'de rejection / outcome toplami kapaniyor

          ## 7) Karisik outcome testi
          - [ ] Mümkünse şu karisimi içeren bir scan çaliştirildi:
            - Bazı ticker'lar rejected
            - Bazilari hold / watch
            - Bazilari insufficient data
          - [ ] **Beklenen:** hepsi bir outcome bucket'ina düşmeli, toplam sayilar kapanmali

          ## 8) Analysis sayfasi regresyon testi
          - [ ] Analysis sayfasina girildi
          - [ ] Sayfa açilmali
          - [ ] Plotly grafikler render olmali
          - [ ] Eski \`yaxis\` hatasi görünmemeli

          ## 9) Son akis / son sinyaller bölümü
          - [ ] Dashboard'daki \`Son Akis\` veya kayitli sinyal alani kontrol edildi
          - [ ] Veri varsa doğru doluyor
          - [ ] Veri yoksa misleading değil net empty state gösteriyor

          ## 10) Görsel / UX kontrolü
          - [ ] Gereksiz \`Logout\` başliği sizmayor
          - [ ] Nav tekrarlari yok
          - [ ] Boş alanlar anlamsiz büyük değil
          - [ ] Metrik kartlari birbiriyle çelişmiyor

          ---

          | Kriter | Durum |
          |--------|-------|
          | Dashboard ve Scan Detail ayni scan sayisini gösteriyor | ☐ Pass ☐ Fail |
          | Invariant check \`✓\` | ☐ Pass ☐ Fail |
          | Empty-state yanliş tetiklenmiyor | ☐ Pass ☐ Fail |
          | Outcome'lar eksiksiz sayiliyor | ☐ Pass ☐ Fail |
          | Refresh / page transition sonrasi veri bozulmuyor | ☐ Pass ☐ Fail |
          | Analysis sayfasi patlamiyor | ☐ Pass ☐ Fail |

          **Genel sonuç:** ☐ PASS ☐ FAIL

          ISSUE_EOF
          )"
