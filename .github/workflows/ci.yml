name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 config.py data_fetcher.py strategy.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy config.py config_store.py data_fetcher.py strategy.py risk_manager.py --ignore-missing-imports || true

      - name: Check imports
        run: |
          python -m compileall config.py config_store.py strategy.py data_fetcher.py risk_manager.py streamlit_app.py || true
