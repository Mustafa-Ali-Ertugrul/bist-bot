name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: src

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github

      - name: Security scan
        run: |
          bandit -q -r src main.py dashboard.py streamlit_app.py --severity-level high --confidence-level medium
          mkdir -p .pip-audit-cache .pip-audit-tmp
          TMPDIR="$PWD/.pip-audit-tmp" pip-audit -r requirements.txt -r dev-requirements.txt --progress-spinner off --cache-dir .pip-audit-cache

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/bist_bot --cov-report=term-missing:skip-covered --cov-report=xml

      - name: Type check with mypy
        run: |
          mypy src/bist_bot --config-file mypy.ini

      - name: Check imports
        run: |
          python -m compileall src/bist_bot main.py dashboard.py streamlit_app.py
