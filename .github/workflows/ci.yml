name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Type check with mypy
        run: |
          mypy config settings state ui db data_fetcher.py strategy.py risk_manager.py streamlit_app.py --ignore-missing-imports || true

      - name: Check imports
        run: |
          python -m compileall config config_store.py db state ui data_fetcher.py strategy.py risk_manager.py streamlit_app.py
