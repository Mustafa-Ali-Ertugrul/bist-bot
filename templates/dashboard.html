<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST Bot — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-border: rgba(99, 102, 241, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.3);
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --purple: #a78bfa;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95em;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        button {
            padding: 14px 28px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        button:hover { 
            border-color: var(--card-hover-border);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button:hover::before { opacity: 1; }

        button:active { transform: translateY(0); }

        button:disabled { 
            opacity: 0.5; 
            cursor: wait; 
            transform: none;
        }

        button.primary { 
            background: var(--accent-gradient);
            color: white;
            border: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        button.primary:hover {
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.45);
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .stat-card:hover::before { opacity: 1; }

        .stat-value {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .signals-container {
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .signals-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
        }

        .signals-table th,
        .signals-table td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .signals-table th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        .signals-table tbody tr {
            transition: all 0.2s ease;
        }

        .signals-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.06);
        }

        .signals-table tbody tr:last-child td {
            border-bottom: none;
        }

        .score-positive { color: var(--green); }
        .score-negative { color: var(--red); }
        .score-neutral { color: var(--yellow); }

        .signal-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .badge-buy { 
            background: rgba(16, 185, 129, 0.12); 
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .badge-sell { 
            background: rgba(239, 68, 68, 0.12); 
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .badge-hold { 
            background: rgba(148, 163, 184, 0.12); 
            color: var(--text-secondary);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .reasons-list {
            font-size: 0.8em;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--card-border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #detail-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            overflow-y: auto;
            padding: 40px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 36px;
            max-width: 800px;
            margin: 40px auto;
            box-shadow: var(--shadow-lg);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-close {
            float: right;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .modal-close:hover { 
            color: var(--red);
            background: rgba(239, 68, 68, 0.1);
        }

        .modal-content h2 {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-content h3 {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 12px;
        }

        .modal-content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .modal-content table td {
            padding: 12px 16px;
            border: none;
        }

        .modal-content table tr {
            background: var(--glass-bg);
            border-radius: 10px;
        }

        .modal-content table td:first-child {
            color: var(--text-muted);
            font-weight: 500;
            border-radius: 10px 0 0 10px;
        }

        .modal-content table td:last-child {
            color: var(--text-primary);
            font-weight: 600;
            border-radius: 0 10px 10px 0;
        }

        .modal-content ul {
            list-style: none;
            padding: 0;
        }

        .modal-content ul li {
            padding: 8px 0;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-content ul li:last-child {
            border-bottom: none;
        }

        .modal-content ul li::before {
            content: '→';
            color: var(--accent-primary);
            margin-right: 10px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .app-container { padding: 20px 16px; }
            .header h1 { font-size: 1.8em; }
            .stat-value { font-size: 1.6em; }
            .signals-table { font-size: 0.85em; }
            .signals-table th, .signals-table td { padding: 12px 10px; }
            .controls { gap: 8px; }
            button { padding: 12px 18px; font-size: 0.85em; }
            .modal-content { padding: 24px; margin: 20px auto; }
        }
    </style>
</head>
<body>

<h1>🤖 BIST Trading Bot</h1>
<p class="subtitle">Semi-Automated Signal Generator • v1.0</p>

<div class="controls">
    <button class="primary" id="btn-scan" onclick="runScan()">
        🔍 Tam Tarama Başlat
    </button>
    <button onclick="loadHistory()">📋 Sinyal Geçmişi</button>
    <button onclick="loadStats()">📊 Performans</button>
</div>

<div class="stats-grid" id="stats-grid">
    <div class="stat-card">
        <div class="stat-value" id="stat-scanned">—</div>
        <div class="stat-label">Taranan</div>
    </div>
    <div class="stat-card">
        <div class="stat-value score-positive" id="stat-buys">—</div>
        <div class="stat-label">Alım Sinyali</div>
    </div>
    <div class="stat-card">
        <div class="stat-value score-negative" id="stat-sells">—</div>
        <div class="stat-label">Satış Sinyali</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-time">—</div>
        <div class="stat-label">Son Tarama</div>
    </div>
</div>

<div id="signals-container">
    <div class="loading" id="loading" style="display:none">
        <div class="spinner"></div>
        <p style="margin-top:10px">Tarama yapılıyor... (~30 saniye)</p>
    </div>

    <table class="signals-table" id="signals-table" style="display:none">
        <thead>
            <tr>
                <th>Hisse</th>
                <th>Sinyal</th>
                <th>Skor</th>
                <th>Fiyat</th>
                <th>Stop-Loss</th>
                <th>Hedef</th>
                <th>Güven</th>
                <th>Nedenler</th>
            </tr>
        </thead>
        <tbody id="signals-body"></tbody>
    </table>
</div>

<div id="detail-modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">✕</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
async function runScan() {
    const btn = document.getElementById('btn-scan');
    const loading = document.getElementById('loading');
    const table = document.getElementById('signals-table');

    btn.disabled = true;
    btn.textContent = '⏳ Taranıyor...';
    loading.style.display = 'block';
    table.style.display = 'none';

    try {
        const res = await fetch('/api/scan', { method: 'POST' });
        const data = await res.json();

        if (data.status === 'ok') {
            renderSignals(data.signals);
            document.getElementById('stat-scanned').textContent = data.scanned;

            const buys = data.signals.filter(s => s.score > 0).length;
            const sells = data.signals.filter(s => s.score < 0).length;

            document.getElementById('stat-buys').textContent = buys;
            document.getElementById('stat-sells').textContent = sells;

            const now = new Date();
            document.getElementById('stat-time').textContent =
                now.getHours().toString().padStart(2,'0') + ':' +
                now.getMinutes().toString().padStart(2,'0');
        } else {
            alert('Hata: ' + data.message);
        }
    } catch (e) {
        alert('Bağlantı hatası: ' + e.message);
    }

    btn.disabled = false;
    btn.textContent = '🔍 Tam Tarama Başlat';
    loading.style.display = 'none';
}

function renderSignals(signals) {
    const tbody = document.getElementById('signals-body');
    const table = document.getElementById('signals-table');
    tbody.innerHTML = '';

    signals.forEach(s => {
        const scoreClass = s.score > 0 ? 'score-positive'
                         : s.score < 0 ? 'score-negative'
                         : 'score-neutral';

        const badgeClass = s.score > 15 ? 'badge-buy'
                         : s.score < -15 ? 'badge-sell'
                         : 'badge-hold';

        const reasons = s.reasons.slice(0, 3).join(' • ');

        const row = document.createElement('tr');
        row.style.cursor = 'pointer';
        row.onclick = () => showDetail(s.ticker);
        row.innerHTML = `
            <td><strong>${s.name}</strong><br>
                <span style="color:var(--text-dim);font-size:0.8em">
                    ${s.ticker.replace('.IS','')}
                </span>
            </td>
            <td><span class="signal-badge ${badgeClass}">${s.signal}</span></td>
            <td class="${scoreClass}" style="font-weight:bold">
                ${s.score > 0 ? '+' : ''}${s.score.toFixed(0)}
            </td>
            <td>₺${s.price.toFixed(2)}</td>
            <td style="color:var(--red)">₺${s.stop_loss.toFixed(2)}</td>
            <td style="color:var(--green)">₺${s.target.toFixed(2)}</td>
            <td>${s.confidence}</td>
            <td class="reasons-list">${reasons}</td>
        `;
        tbody.appendChild(row);
    });

    table.style.display = 'table';
}

async function showDetail(ticker) {
    const modal = document.getElementById('detail-modal');
    const body = document.getElementById('modal-body');

    body.innerHTML = '<div class="loading"><div class="spinner"></div><p>Yükleniyor...</p></div>';
    modal.style.display = 'block';

    try {
        const res = await fetch(`/api/analyze/${ticker}`);
        const data = await res.json();

        if (data.status === 'ok') {
            const s = data.snapshot;
            const sig = data.signal;

            body.innerHTML = `
                <h2>${data.name} (${ticker.replace('.IS','')})</h2>
                <br>
                <h3>${sig.type} (Skor: ${sig.score > 0 ? '+' : ''}${sig.score.toFixed(0)})</h3>
                <br>
                <table style="width:100%">
                    <tr><td>Kapanış</td><td>₺${s.close}</td></tr>
                    <tr><td>Değişim</td><td>${s.change_pct}%</td></tr>
                    <tr><td>RSI</td><td>${s.rsi} (${s.rsi_zone})</td></tr>
                    <tr><td>Hacim Oranı</td><td>${s.volume_ratio}x</td></tr>
                    <tr><td>ATR</td><td>₺${s.atr}</td></tr>
                    <tr><td>Destek</td><td>₺${s.support}</td></tr>
                    <tr><td>Direnç</td><td>₺${s.resistance}</td></tr>
                    <tr><td>Stop-Loss</td><td style="color:var(--red)">₺${sig.stop_loss}</td></tr>
                    <tr><td>Hedef</td><td style="color:var(--green)">₺${sig.target}</td></tr>
                </table>
                <br>
                <h3>Nedenler:</h3>
                <ul>
                    ${sig.reasons.map(r => `<li>${r}</li>`).join('')}
                </ul>
            `;
        }
    } catch(e) {
        body.innerHTML = `<p>Hata: ${e.message}</p>`;
    }
}

function closeModal() {
    document.getElementById('detail-modal').style.display = 'none';
}

async function loadHistory() {
    try {
        const res = await fetch('/api/signals/history?limit=30');
        const data = await res.json();
        if (data.signals && data.signals.length > 0) {
            alert(`Son ${data.signals.length} sinyal yüklendi.\n\n` +
                  data.signals.slice(0,5).map(s =>
                      `${s.ticker}: ${s.signal_type} (₺${s.price})`
                  ).join('\n'));
        } else {
            alert('Henüz kayıtlı sinyal yok. Önce tarama yapın.');
        }
    } catch(e) { alert('Hata: ' + e.message); }
}

async function loadStats() {
    try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        const s = data.stats;
        alert(
            `📊 Performans İstatistikleri\n\n` +
            `Toplam Sinyal: ${s.total_signals}\n` +
            `Tamamlanan: ${s.completed}\n` +
            `Kazanan: ${s.profitable}\n` +
            `Kazanma Oranı: %${s.win_rate}\n` +
            `Ort. Kâr/Zarar: %${s.avg_profit_pct}`
        );
    } catch(e) { alert('Hata: ' + e.message); }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});
</script>

</body>
</html>
